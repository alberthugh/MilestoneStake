<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" role="img" aria-label="MilestoneStake milestone garden: four stems topped by pixel-flowers, one per milestone, coloured by settlement state on cobalt graph-paper">
  <defs>
    <!-- cobalt ground gradient (radial bloom, matches body bg) -->
    <radialGradient id="ms-ground" cx="50%" cy="118%" r="80%">
      <stop offset="0%" stop-color="#1230c2"/>
      <stop offset="70%" stop-color="#1b3ceb"/>
      <stop offset="100%" stop-color="#1b3ceb"/>
    </radialGradient>
    <!-- 44px graph-paper grid, faint periwinkle -->
    <pattern id="ms-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#7896ff" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
    <linearGradient id="ms-stem-live" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#36e27b"/>
      <stop offset="100%" stop-color="#1e9c54"/>
    </linearGradient>
    <linearGradient id="ms-stem-dim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b9c4ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b9c4ff" stop-opacity="0.22"/>
    </linearGradient>
    <!-- pixel-flower: 8 square petals around a square core, on a 7x7 cell grid -->
    <g id="ms-flower">
      <g shape-rendering="crispEdges">
        <rect x="-7" y="-21" width="14" height="14"/>
        <rect x="-7" y="7"  width="14" height="14"/>
        <rect x="-21" y="-7" width="14" height="14"/>
        <rect x="7"  y="-7" width="14" height="14"/>
        <rect x="-18" y="-18" width="11" height="11" opacity="0.85"/>
        <rect x="7"   y="-18" width="11" height="11" opacity="0.85"/>
        <rect x="-18" y="7"   width="11" height="11" opacity="0.85"/>
        <rect x="7"   y="7"   width="11" height="11" opacity="0.85"/>
      </g>
    </g>
  </defs>

  <rect width="760" height="320" rx="16" fill="url(#ms-ground)"/>
  <rect width="760" height="320" rx="16" fill="url(#ms-grid)"/>

  <!-- wordmark + legend -->
  <text x="34" y="44" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="25" fill="#f4f1e9" letter-spacing="-0.4">MilestoneStake</text>
  <text x="34" y="64" font-family="ui-monospace, 'Courier New', monospace" font-size="10" letter-spacing="3" fill="#b9c4ff">THE MILESTONE GARDEN — ONE BLOOM PER RELEASE</text>

  <!-- legend chips -->
  <g font-family="ui-monospace, 'Courier New', monospace" font-size="10" letter-spacing="1.5">
    <rect x="520" y="30" width="9" height="9" fill="#36e27b"/><text x="534" y="39" fill="#f4f1e9">RELEASED</text>
    <rect x="606" y="30" width="9" height="9" fill="#ffd23e"/><text x="620" y="39" fill="#f4f1e9">PENDING</text>
    <rect x="686" y="30" width="9" height="9" fill="#ff5757"/><text x="700" y="39" fill="#f4f1e9">PENALIZED</text>
  </g>

  <!-- soil line / pool baseline -->
  <line x1="34" y1="276" x2="726" y2="276" stroke="#b9c4ff" stroke-opacity="0.4" stroke-width="2"/>
  <text x="726" y="296" text-anchor="end" font-family="ui-monospace, 'Courier New', monospace" font-size="10" letter-spacing="2" fill="#b9c4ff">POOL $5.00 · 4 × $1.25</text>

  <!-- M1 — released, on time: tall green stem, glowing green bloom -->
  <g>
    <rect x="132" y="150" width="3" height="126" fill="url(#ms-stem-live)"/>
    <g transform="translate(133.5,138)" fill="#36e27b" filter="drop-shadow(0 0 9px rgba(54,226,123,0.55))">
      <use href="#ms-flower"/>
      <rect x="-6" y="-6" width="12" height="12" fill="#053d1f"/>
    </g>
    <text x="133.5" y="298" text-anchor="middle" font-family="ui-monospace, 'Courier New', monospace" font-size="11" fill="#36e27b" font-weight="600">M1</text>
    <text x="133.5" y="312" text-anchor="middle" font-family="ui-monospace, 'Courier New', monospace" font-size="8.5" letter-spacing="1" fill="#b9c4ff">2500bps</text>
  </g>

  <!-- M2 — released, on time -->
  <g>
    <rect x="287" y="162" width="3" height="114" fill="url(#ms-stem-live)"/>
    <g transform="translate(288.5,150)" fill="#36e27b" filter="drop-shadow(0 0 9px rgba(54,226,123,0.55))">
      <use href="#ms-flower"/>
      <rect x="-6" y="-6" width="12" height="12" fill="#053d1f"/>
    </g>
    <text x="288.5" y="298" text-anchor="middle" font-family="ui-monospace, 'Courier New', monospace" font-size="11" fill="#36e27b" font-weight="600">M2</text>
    <text x="288.5" y="312" text-anchor="middle" font-family="ui-monospace, 'Courier New', monospace" font-size="8.5" letter-spacing="1" fill="#b9c4ff">2500bps</text>
  </g>

  <!-- M3 — pending (current, awaiting confirm): dim stem, yellow half-open bud -->
  <g>
    <rect x="442" y="196" width="3" height="80" fill="url(#ms-stem-dim)"/>
    <g transform="translate(443.5,184)" fill="#ffd23e">
      <g shape-rendering="crispEdges" opacity="0.92">
        <rect x="-6" y="-18" width="12" height="12"/>
        <rect x="-18" y="-6" width="12" height="12"/>
        <rect x="6"  y="-6" width="12" height="12"/>
        <rect x="-6" y="6"  width="12" height="12" opacity="0.6"/>
      </g>
      <rect x="-5" y="-5" width="10" height="10" fill="#1b3ceb"/>
    </g>
    <text x="443.5" y="298" text-anchor="middle" font-family="ui-monospace, 'Courier New', monospace" font-size="11" fill="#ffd23e" font-weight="600">M3</text>
    <text x="443.5" y="312" text-anchor="middle" font-family="ui-monospace, 'Courier New', monospace" font-size="8.5" letter-spacing="1" fill="#b9c4ff">OPEN</text>
  </g>

  <!-- M4 — penalized (late / refunded to customer): short red stem, wilting red flower -->
  <g>
    <rect x="597" y="224" width="3" height="52" fill="#ff5757" opacity="0.7"/>
    <g transform="translate(598.5,212) rotate(14)" fill="#ff5757">
      <g shape-rendering="crispEdges">
        <rect x="-7" y="-20" width="13" height="13" opacity="0.55"/>
        <rect x="-20" y="-7" width="13" height="13" opacity="0.85"/>
        <rect x="7"  y="-7" width="13" height="13" opacity="0.7"/>
        <rect x="-7" y="6"  width="13" height="13" opacity="0.85"/>
      </g>
      <rect x="-6" y="-6" width="12" height="12" fill="#5c0d0d"/>
    </g>
    <text x="598.5" y="298" text-anchor="middle" font-family="ui-monospace, 'Courier New', monospace" font-size="11" fill="#ff5757" font-weight="600">M4</text>
    <text x="598.5" y="312" text-anchor="middle" font-family="ui-monospace, 'Courier New', monospace" font-size="8.5" letter-spacing="1" fill="#b9c4ff">LATE</text>
  </g>

  <!-- tiny floating pixel petals (decorative) -->
  <g shape-rendering="crispEdges" opacity="0.6">
    <rect x="210" y="92" width="7" height="7" fill="#ffd23e"/>
    <rect x="365" y="118" width="6" height="6" fill="#36e27b"/>
    <rect x="520" y="150" width="6" height="6" fill="#b9c4ff"/>
    <rect x="92"  y="120" width="6" height="6" fill="#36e27b"/>
  </g>
</svg>
